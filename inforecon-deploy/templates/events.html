<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>InfoRecon - 事件</title><link rel="stylesheet" href="/static/style.css"></head>
<body><div class="container">
<nav><a href="/" class="logo">InfoRecon</a><a href="/predictions">预测</a><a href="/events">事件</a><a href="/rules">规则引擎</a><a href="/trades">交易</a></nav>
<div class="section"><h2>事件流 <a href="/events/add" style="float:right;font-size:13px">+ 添加</a></h2>
<div class="filter-row"><a href="/events">全部</a><a href="/events?category=geopolitics">地缘</a><a href="/events?category=economy">经济</a><a href="/events?category=tech">科技</a></div>
<div class="events-list">
{% for ev in events %}
<div class="event-item">
<span class="ev-date">{{ ev.date[:10] }}</span>
<span class="ev-cat tag-{{ ev.category }}">{{ ev.category }}</span>
{% if ev.ticker %}<span class="ev-ticker">{{ ev.ticker }}</span>{% endif %}
<span class="ev-title">{{ ev.title[:60] }}</span>
{% if ev.sentiment %}<span class="sentiment-{{ ev.sentiment }}">{{ ev.sentiment }}</span>{% endif %}
{% if ev.description %}<div class="ev-desc">{{ ev.description[:80] }}</div>{% endif %}
</div>
{% endfor %}</div></div></div>
</body></html>
