<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>添加事件</title><link rel="stylesheet" href="/static/style.css"></head>
<body><div class="container">
<nav><a href="/" class="logo">InfoRecon</a><a href="/predictions">预测</a><a href="/events">事件</a><a href="/rules">规则引擎</a><a href="/trades">交易</a></nav>
<div class="section"><h2>添加事件</h2>
<form method="post" action="/events/add" class="pred-form">
<div class="form-row"><label>日期</label><input name="date" type="date" required></div>
<div class="form-row"><label>标题</label><input name="title" size="50" required></div>
<div class="form-row"><label>描述</label><textarea name="description" rows="3" cols="50"></textarea></div>
<div class="form-row"><label>类别</label><select name="category"><option value="geopolitics">地缘政治</option><option value="economy">经济</option><option value="tech">科技</option><option value="other">其他</option></select></div>
<div class="form-row"><label>影响度</label><input name="impact" type="range" min="1" max="10" value="5"><span>5</span></div>
<div class="form-row"><label>关联代码</label><input name="ticker" placeholder="如: SPCX, AAPL" size="20"></div>
<div class="form-row"><label>情绪</label><select name="sentiment"><option value="bullish">利好</option><option value="bearish">利空</option><option value="neutral">中性</option></select></div>
<div class="form-row"><label>量化指标</label><input name="impact_metric" type="number" step="0.1" value="0.0"></div>
<div class="form-row"><button type="submit">保存</button></div>
</form></div></div>
</body></html>
