<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qiaoxingyu · 投资工具箱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #0b1120;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.container {
  text-align: center;
  max-width: 680px;
  padding: 40px 20px;
}
.avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, #60a5fa, #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700; color: #fff;
  margin: 0 auto 20px;
}
h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
h1 span { background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { color: #6b7280; font-size: 14px; margin-bottom: 36px; }
.cards {
  display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
}
.card {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 14px;
  padding: 28px 24px;
  width: 280px;
  text-align: left;
  transition: all 0.25s;
  cursor: pointer;
  text-decoration: none;
  color: #e0e0e0;
}
.card:hover {
  border-color: #374151;
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.card-icon { font-size: 32px; margin-bottom: 12px; }
.card h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.card p { font-size: 13px; color: #6b7280; line-height: 1.5; }
.card .tag {
  display: inline-block; margin-top: 12px;
  padding: 3px 10px; border-radius: 10px;
  font-size: 11px; font-weight: 500;
}
.tag-blue { background: #1e3a5f; color: #93c5fd; }
.tag-green { background: #1a5c38; color: #6ee7b7; }
.tag-gray { background: #1f2937; color: #9ca3af; }
.card.coming {
  opacity: 0.5;
  cursor: default;
}
.footer {
  margin-top: 40px;
  font-size: 12px;
  color: #374151;
}
</style>
</head>
<body>
<div class="container">
  <div class="avatar">Q</div>
  <h1><span>qiaoxingyu</span> · 投资工具箱</h1>
  <p class="subtitle">信息聚合 · 产业链拆解 · 决策校准</p>

  <div class="cards">
    <a href="/ai-chain/" class="card">
      <div class="card-icon">🤖</div>
      <h2>AI 产业链全景图</h2>
      <p>从芯片到应用的完整链路梳理，点击查看各环节龙头公司的详细信息与实时行情。</p>
      <span class="tag tag-blue">交互式看板</span>
    </a>

    <a href="/inforecon/" class="card coming">
      <div class="card-icon">📊</div>
      <h2>InfoRecon</h2>
      <p>宏观指标监控 · 事件追踪 · 预测校准 · 交易决策辅助系统。</p>
      <span class="tag tag-gray">开发中</span>
    </a>
  </div>

  <div class="footer">
    hosted on GitHub Pages
  </div>
</div>
</body>
</html>
